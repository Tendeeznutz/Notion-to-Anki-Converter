name: Build & Release

# Trigger on version tags (e.g. v1.0.0, v2.3.1-beta)
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to upload release assets

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Build matrix — Windows .exe and macOS .app
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: NotionToAnki-windows
            asset_name:    NotionToAnki-windows.exe
            dist_file:     dist/NotionToAnki.exe

          - os: macos-latest
            artifact_name: NotionToAnki-macos
            asset_name:    NotionToAnki-macos.zip
            dist_file:     dist/NotionToAnki-macos.zip

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── Python ───────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── Dependencies ─────────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # ── Build (Windows) ──────────────────────────────────────────────────
      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        run: pyinstaller notion_anki.spec --noconfirm --clean

      # ── Build (macOS) ────────────────────────────────────────────────────
      - name: Build app bundle (macOS)
        if: runner.os == 'macOS'
        run: pyinstaller notion_anki.spec --noconfirm --clean

      # ── Zip the .app bundle (macOS) ──────────────────────────────────────
      - name: Zip .app bundle (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r --symlinks NotionToAnki-macos.zip NotionToAnki.app

      # ── Smoke-test: verify the binary exists ─────────────────────────────
      - name: Verify build output
        shell: bash
        run: |
          if [ -f "${{ matrix.dist_file }}" ]; then
            echo "✓ Build artefact found: ${{ matrix.dist_file }}"
            ls -lh "${{ matrix.dist_file }}"
          else
            echo "✗ Build artefact NOT found: ${{ matrix.dist_file }}"
            exit 1
          fi

      # ── Upload as a workflow artefact (for debugging / manual download) ──
      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.dist_file }}
          retention-days: 14

  # ────────────────────────────────────────────────────────────────────────────
  # Release — runs after both build jobs succeed, attaches assets to the tag
  # ────────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      # ── Download both build artefacts ────────────────────────────────────
      - name: Download Windows artefact
        uses: actions/download-artifact@v4
        with:
          name: NotionToAnki-windows
          path: release/

      - name: Download macOS artefact
        uses: actions/download-artifact@v4
        with:
          name: NotionToAnki-macos
          path: release/

      # ── List what we have ────────────────────────────────────────────────
      - name: List release assets
        run: ls -lh release/

      # ── Publish the GitHub Release with both assets ───────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Notion → Anki Converter ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}  # e.g. v1.0.0-beta → pre-release
          body: |
            ## Notion → Anki Converter ${{ github.ref_name }}

            Convert your Notion Markdown exports into Anki flashcard decks — fully local, no cloud required.

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows 10/11 (64-bit) | `NotionToAnki-windows.exe` |
            | macOS 10.15+ | `NotionToAnki-macos.zip` — unzip, then open `NotionToAnki.app` |

            ### Requirements
            - [Ollama](https://ollama.com/download) must be installed and running
            - Pull the required models once:
              ```
              ollama pull llama3
              ollama pull llava
              ```

            ### First run (macOS)
            macOS may show a security warning. Go to **System Settings → Privacy & Security** and click **Open Anyway**.
          files: |
            release/NotionToAnki.exe
            release/NotionToAnki-macos.zip
